name: Mycelium Provider Conformance

on:
  pull_request:
    paths:
      - 'examples/conformance/provider-protocol/**'
      - 'docs/mycelium-provider-protocol.md'

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run provider conformance vectors
        run: python examples/conformance/provider-protocol/verify.py
